ktor:
    application:
        modules:
            - com.example.ApplicationKt.module
    deployment:
        port: 8080
postgres:
  url: ${DB_URL:"jdbc:postgresql://localhost:5432/notesync"}
  user: ${DB_USER:notesync_user}
  password: ${DB_PASS:notesync_pass}
jwt:
  domain: "https://jwt-provider-domain/"
  audience: "jwt-audience"
  realm: "ktor sample app"
  secret: ${JWT_SECRET}